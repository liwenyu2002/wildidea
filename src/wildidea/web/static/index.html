<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WildIdea · 想出不一样的点子</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=20260607-char-outline-3x">
  <link rel="shortcut icon" type="image/svg+xml" href="/static/favicon.svg?v=20260607-char-outline-3x">
  <link rel="stylesheet" href="/static/styles.css?v=20260610-history-list">
</head>
<body class="app-booting">
  <div id="bootCurtain" class="boot-curtain" aria-hidden="true">
    <div class="boot-mark">
      <img src="/static/brand-logo.svg?v=20260607-blue-outline-2x" alt="">
      <strong class="glitch-text" data-text="WildIdea">WildIdea</strong>
      <span class="boot-dots"><i></i><i></i><i></i></span>
    </div>
  </div>
  <div class="shell">
    <aside class="sidebar">
      <button id="historyCloseBtn" class="drawer-close ghost" type="button" aria-label="关闭历史侧边栏">关闭</button>
      <button id="brandHomeBtn" class="brand" type="button">
        <img class="brand-logo" src="/static/brand-logo.svg?v=20260607-blue-outline-2x" alt="" aria-hidden="true">
        <div class="brand-copy">
          <strong class="glitch-text" data-text="WildIdea">WildIdea</strong>
          <span class="glitch-text glitch-subtitle" data-text="帮你想出不一样的点子">帮你想出不一样的点子</span>
        </div>
      </button>

      <section id="authPanel" class="panel auth-panel hidden">
        <div class="tabs">
          <button id="loginTab" class="tab active" type="button">登录</button>
          <button id="registerTab" class="tab" type="button">注册</button>
        </div>
        <form id="authForm" class="form">
          <label>
            邮箱
            <input id="email" type="email" autocomplete="email" required>
          </label>
          <label>
            密码
            <input id="password" type="password" autocomplete="current-password" minlength="6" required>
          </label>
          <label id="emailCodeWrap" class="hidden">
            邮箱验证码
            <div class="code-row">
              <input id="emailCode" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="12">
              <button id="sendEmailCodeBtn" class="ghost" type="button">发送验证码</button>
            </div>
          </label>
          <label id="inviteAtRegisterWrap" class="hidden">
            邀请码
            <input id="inviteAtRegister" type="text" autocomplete="off">
          </label>
          <label id="improvementConsentWrap" class="check consent-check hidden">
            <input id="improvementConsent" type="checkbox">
            <span>
              <strong>我同意将交互数据用于改进 WildIdea 结果</strong>
              <small>我们会保护你的隐私，数据仅用于提升生成质量和产品体验，不会公开个人身份信息。</small>
            </span>
          </label>
          <button id="authSubmit" class="primary" type="submit">登录</button>
        </form>
      </section>

      <section id="userPanel" class="panel hidden">
        <div class="user-row">
          <div>
            <span id="userEmail" class="muted"></span>
            <strong id="creditBalance">0 积分</strong>
          </div>
          <button id="logoutBtn" class="ghost" type="button">退出</button>
        </div>
        <form id="redeemForm" class="invite-form">
          <input id="redeemCode" type="text" placeholder="登录后填写邀请码">
          <button type="submit">兑换</button>
        </form>
      </section>

      <section id="historyPanel" class="panel hidden">
        <div class="panel-head">
          <strong>历史任务</strong>
          <button id="refreshRunsBtn" class="ghost" type="button">刷新</button>
        </div>
        <label class="history-search">
          <span>查询</span>
          <input id="historySearch" type="search" autocomplete="off" placeholder="搜索问题、状态或日期">
        </label>
        <div id="runList" class="run-list"></div>
      </section>
    </aside>

    <main class="main">
      <section class="toolbar">
        <div>
          <h1 id="toolbarTitle">生成工作台</h1>
          <p id="toolbarSubtitle">每张卡片消耗 1 积分；系统失败会自动退回本次扣除。</p>
        </div>
        <div class="toolbar-actions">
          <button id="historyDrawerBtn" class="mobile-history-trigger ghost" type="button" aria-expanded="false">历史</button>
          <button id="statusPill" class="status-pill" type="button" disabled>正在加载</button>
        </div>
      </section>

      <section id="workspace" class="workspace hidden search-open">
        <form id="runForm" class="composer">
          <div class="search-heading">
            <span>开始一次发散</span>
            <strong>输入问题，抽取跨域灵感卡</strong>
          </div>
          <textarea id="problem" rows="5" placeholder="输入你想发散的问题，例如：给相册 App 找非常规设计思路" required></textarea>
          <div class="composer-grid">
            <label>
              禁词
              <input id="forbidTerms" type="text" placeholder="用空格分隔，例如 EEG 脑电 被试">
            </label>
            <label>
              槽位数
              <input id="slotCount" type="number" value="10" min="1" max="10">
            </label>
          </div>
          <button id="runSubmit" class="primary" type="submit">消耗 10 积分生成</button>
        </form>

        <div id="launchGhost" class="launch-ghost hidden">
          <span>开始生成</span>
          <strong id="launchGhostText"></strong>
        </div>

        <section id="resultSection" class="result-section hidden">
          <div class="result-head">
            <div>
              <strong id="currentRunTitle">还没有选择任务</strong>
              <span id="currentRunMeta" class="muted"></span>
            </div>
          </div>
          <div id="progressLog" class="progress-log"></div>
          <div id="candidateGrid" class="candidate-grid"></div>
        </section>
      </section>

      <section id="adminPanel" class="admin-panel hidden">
        <div class="panel-head">
          <strong>管理员后台</strong>
          <button id="refreshAdminBtn" class="ghost" type="button">刷新</button>
        </div>
        <div id="metrics" class="metrics"></div>
        <div id="queueStatus" class="queue-status"></div>
        <form id="inviteForm" class="invite-create">
          <input id="inviteCode" type="text" placeholder="邀请码，留空自动生成">
          <input id="inviteBonus" type="number" value="20" min="1">
          <input id="inviteMax" type="number" placeholder="最大兑换次数">
          <button type="submit">创建邀请码</button>
        </form>
        <div class="admin-columns">
          <div>
            <h2>邀请码</h2>
            <div id="inviteList" class="admin-list"></div>
          </div>
          <div>
            <h2>用户</h2>
            <div id="userList" class="admin-list"></div>
          </div>
        </div>
        <div>
          <div class="section-title-row">
            <h2>反馈数据</h2>
            <button id="exportFeedbackBtn" class="ghost" type="button">导出全量 Excel</button>
          </div>
          <div id="feedbackList" class="admin-list feedback-list"></div>
        </div>
      </section>

      <section id="emptyState" class="empty-state hidden">
        <h2>先登录或注册</h2>
        <p>注册会自动获得 30 积分。</p>
      </section>
    </main>
  </div>
  <div id="posterModal" class="poster-modal hidden" role="dialog" aria-modal="true" aria-labelledby="posterModalTitle">
    <button id="posterBackdrop" class="poster-backdrop" type="button" aria-label="关闭海报预览"></button>
    <div class="poster-dialog">
      <div class="poster-dialog-head">
        <div>
          <span class="candidate-index">海报预览</span>
          <strong id="posterModalTitle">另存为海报</strong>
        </div>
        <button id="posterCloseBtn" class="ghost" type="button">关闭</button>
      </div>
      <div class="poster-preview">
        <canvas id="posterCanvas" width="1080" height="1920"></canvas>
      </div>
      <div class="poster-actions">
        <span id="posterHint" class="muted">二维码指向当前网站首页。</span>
        <button id="posterDownloadBtn" class="primary" type="button">下载 PNG</button>
      </div>
    </div>
  </div>
  <button id="historyBackdrop" class="history-backdrop hidden" type="button" aria-label="关闭历史侧边栏"></button>
  <div id="toast" class="toast hidden"></div>
  <script src="/static/app.js?v=20260610-history-list"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildIdea · {TITLE}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #f3eee4;
    color: #211f1c;
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: grid;
    place-items: center;
    padding: 18px;
  }
  .slide {
    width: min(96vw, 1600px);
    aspect-ratio: 16 / 9;
    background: #fbf7ef;
    border: 1px solid #ded4c5;
    border-radius: 12px;
    padding: 26px;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 12px;
    overflow: hidden;
    box-shadow: 0 24px 70px #6f5f4a2b;
  }
  header {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: flex-start;
  }
  .kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #7c4a2d;
    border: 1px solid #d7b99f;
    background: #f1e3d4;
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1.5px;
  }
  h1 {
    margin-top: 9px;
    font-size: clamp(28px, 3.2vw, 54px);
    line-height: 1.02;
    font-weight: 900;
    letter-spacing: 0;
    color: #2b211b;
  }
  .subtitle {
    margin-top: 8px;
    color: #6f655b;
    font-size: clamp(12px, 1vw, 16px);
  }
  .stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
    max-width: 520px;
  }
  .stat {
    min-width: 112px;
    background: #f4eadc;
    border: 1px solid #dfcfbd;
    border-radius: 8px;
    padding: 8px 10px;
    text-align: right;
  }
  .stat b { display: block; color: #8a4f32; font-size: 17px; line-height: 1; margin-bottom: 3px; }
  .stat span { color: #766b60; font-size: 11px; }
  .ban {
    background: #f6efe5;
    border: 1px dashed #d9c7b6;
    border-radius: 9px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #766b60;
    font-size: 11px;
  }
  .ban strong { color: #463a31; white-space: nowrap; }
  .ban .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .ban span {
    background: #efe2d4;
    border-radius: 5px;
    padding: 2px 7px;
    text-decoration: line-through;
    color: #8a7d70;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, minmax(0, auto));
    gap: 9px;
    min-height: 0;
  }
  .card {
    min-width: 0;
    min-height: 0;
    background: #fffaf2;
    border: 1px solid #dfd1c2;
    border-radius: 9px;
    padding: 10px 12px 9px;
    display: grid;
    grid-template-rows: auto auto auto auto auto;
    align-content: start;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #b46b45, #d7a86e);
  }
  .id {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    color: #8b7f73;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.4px;
  }
  .id em { color: #8a4f32; font-style: normal; }
  .slot {
    color: #3b271c;
    background: #ead1ba;
    border-radius: 999px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 900;
    white-space: nowrap;
    letter-spacing: 0;
  }
  .source {
    color: #817569;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .source strong { color: #8a4f32; font-weight: 900; }
  .name {
    color: #7c4a2d;
    font-size: clamp(14px, 1.08vw, 17px);
    font-weight: 900;
    line-height: 1.18;
  }
  .desc {
    color: #38322d;
    font-size: clamp(14px, 1.08vw, 16px);
    line-height: 1.34;
    overflow: hidden;
  }
  .fail {
    color: #766b60;
    font-size: clamp(10px, 0.78vw, 12px);
    line-height: 1.3;
    border-top: 1px solid #e1d2c2;
    padding-top: 5px;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: center;
    color: #665d55;
    font-size: 12px;
  }
  .bottom strong { color: #7c4a2d; }
  .footer { color: #9a8f83; font-size: 10px; letter-spacing: 1px; white-space: nowrap; }
  @media (max-aspect-ratio: 4 / 3) {
    body { place-items: start center; }
    .slide { width: 1200px; max-width: none; }
  }
</style>
</head>
<body>
<main class="slide">
  <header>
    <div>
      <div class="kicker">{BADGE_TEXT}</div>
      <h1>{TITLE}</h1>
      <div class="subtitle">{FOCUS}</div>
    </div>
    {META_HTML}
  </header>

  {QUARANTINE_HTML}
  {CARD_ROWS}
  {SUMMARY}
</main>
</body>
</html>
